version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - errcheck
    - errorlint
    - nilerr
    - gosec
    - gocyclo
    - revive
    - goconst
    - misspell
    - unparam
    - copyloopvar
    - testifylint
    - thelper
    - paralleltest
    - bodyclose

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    
    govet:
      enable-all: true
    
    gocyclo:
      min-complexity: 20 
    
    revive:
      severity: warning
      confidence: 0.8

  exclusions:
    rules:
      - path: (.+)_test\.go
        linters:
          - funlen 
          - goconst 

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: false